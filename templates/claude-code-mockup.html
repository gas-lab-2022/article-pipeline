<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Mockup</title>
  <style>
    /* ========================================
       Claude Code color palette
       ======================================== */
    :root {
      --cc-width: 900px;
      --cc-bg: #1a1a2e;
      --cc-bg-lighter: #252538;
      --cc-text: #e0e0e8;
      --cc-text-bold: #f4f4f5;
      --cc-muted: #71717a;
      --cc-accent: #c9835e;
      --cc-green: #4ade80;
      --cc-blue: #7aa2f7;
      --cc-separator: #333348;
      --cc-diff-red-bg: #3f1f1f;
      --cc-diff-red: #f87171;
      --cc-diff-green-bg: #1a3a2a;
      --cc-diff-green: #4ade80;
    }

    /* ========================================
       Reset & base
       ======================================== */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111122;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      min-height: 100vh;
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      line-height: 1.5;
      color: var(--cc-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========================================
       Container
       ======================================== */
    .cc-container {
      width: var(--cc-width);
      background-color: var(--cc-bg);
      border-radius: 10px;
      padding: 20px 24px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        0 2px 8px rgba(0, 0, 0, 0.3);
    }

    /* ========================================
       1. cc-header — Version/model/directory
       ======================================== */
    .cc-header {
      margin-bottom: 12px;
    }

    .cc-header .cc-header-version {
      color: var(--cc-text-bold);
      font-weight: 600;
      font-size: 14px;
    }

    .cc-header .cc-header-model {
      color: var(--cc-muted);
      font-size: 13px;
    }

    .cc-header .cc-header-dir {
      color: var(--cc-muted);
      font-size: 13px;
    }

    /* ========================================
       2. cc-response — Claude's response lines
       ======================================== */
    .cc-response {
      padding: 2px 0;
      color: var(--cc-text);
      line-height: 1.5;
    }

    .cc-response .cc-dot {
      color: var(--cc-text-bold);
      margin-right: 6px;
    }

    .cc-response .cc-dot.green {
      color: var(--cc-green);
    }

    .cc-response .cc-dot.blue {
      color: var(--cc-blue);
    }

    .cc-response .cc-bold {
      color: var(--cc-text-bold);
      font-weight: 600;
    }

    .cc-response .cc-code {
      color: var(--cc-blue);
    }

    /* ========================================
       3. cc-skill — Skill invocation box
       ======================================== */
    .cc-skill {
      display: inline-block;
      background-color: var(--cc-bg-lighter);
      border: 1px solid var(--cc-separator);
      border-radius: 6px;
      padding: 4px 12px;
      margin: 6px 0;
    }

    .cc-skill .cc-skill-icon {
      color: var(--cc-accent);
      margin-right: 4px;
    }

    .cc-skill .cc-skill-name {
      color: var(--cc-text-bold);
      font-weight: 600;
    }

    /* ========================================
       4. cc-tool-loaded — Tool loaded indicator
       ======================================== */
    .cc-tool-loaded {
      display: inline-block;
      background-color: var(--cc-bg-lighter);
      border: 1px solid var(--cc-separator);
      border-radius: 6px;
      padding: 3px 10px;
      margin: 4px 0;
      color: var(--cc-muted);
      font-size: 13px;
    }

    .cc-tool-loaded .cc-tool-icon {
      color: var(--cc-accent);
      margin-right: 4px;
    }

    /* ========================================
       5. cc-search — Search result summary
       ======================================== */
    .cc-search {
      padding: 2px 0;
      color: var(--cc-muted);
      font-size: 13px;
    }

    .cc-search .cc-dot {
      margin-right: 6px;
    }

    .cc-search .cc-dot.green {
      color: var(--cc-green);
    }

    .cc-search .cc-dot.blue {
      color: var(--cc-blue);
    }

    .cc-search .cc-search-hint {
      color: var(--cc-muted);
      opacity: 0.7;
    }

    /* ========================================
       6. cc-search-detail — Indented search detail
       ======================================== */
    .cc-search-detail {
      padding: 0 0 0 20px;
      color: var(--cc-muted);
      font-size: 13px;
    }

    .cc-search-detail .cc-tree-char {
      color: var(--cc-muted);
      margin-right: 4px;
      opacity: 0.6;
    }

    /* ========================================
       7. cc-thinking — Thinking indicator
       ======================================== */
    .cc-thinking {
      padding: 2px 0;
      color: var(--cc-accent);
    }

    .cc-thinking .cc-thinking-icon {
      margin-right: 6px;
    }

    .cc-thinking .cc-thinking-meta {
      color: var(--cc-muted);
      font-size: 13px;
    }

    /* ========================================
       8. cc-agent-tree — Agent tree display
       ======================================== */
    .cc-agent-tree {
      margin: 6px 0;
    }

    .cc-agent-header {
      padding: 2px 0;
      color: var(--cc-text);
    }

    .cc-agent-header .cc-dot {
      color: var(--cc-green);
      margin-right: 6px;
    }

    .cc-agent-header .cc-agent-hint {
      color: var(--cc-muted);
      opacity: 0.7;
    }

    .cc-tree-line {
      color: var(--cc-text);
      white-space: pre;
      font-size: 13px;
      line-height: 1.5;
    }

    .cc-tree-line .cc-tree-branch {
      color: var(--cc-muted);
    }

    .cc-tree-line .cc-tree-label {
      color: var(--cc-text);
    }

    .cc-tree-line .cc-tree-meta {
      color: var(--cc-muted);
      font-size: 12px;
    }

    .cc-tree-line.indent {
      padding-left: 0;
    }

    .cc-tree-line .cc-tree-status {
      color: var(--cc-muted);
      font-size: 13px;
    }

    .cc-tree-hint {
      color: var(--cc-muted);
      font-size: 12px;
      padding-left: 24px;
      opacity: 0.7;
    }

    /* ========================================
       9. cc-diff — File diff view
       ======================================== */
    .cc-diff {
      border: 1px solid var(--cc-separator);
      border-radius: 8px;
      overflow: hidden;
      margin: 8px 0;
      font-size: 13px;
    }

    .cc-diff-header {
      background-color: var(--cc-bg-lighter);
      padding: 6px 14px;
      border-bottom: 1px solid var(--cc-separator);
    }

    .cc-diff-title {
      color: var(--cc-muted);
      font-size: 12px;
    }

    .cc-diff-filename {
      color: var(--cc-text-bold);
      font-weight: 600;
      font-size: 13px;
    }

    .cc-diff-line {
      display: flex;
      padding: 0 14px;
      line-height: 1.6;
      white-space: pre;
    }

    .cc-diff-line .line-number {
      display: inline-block;
      width: 32px;
      text-align: right;
      color: var(--cc-muted);
      margin-right: 12px;
      user-select: none;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .cc-diff-line .line-content {
      flex: 1;
      min-width: 0;
    }

    .cc-diff-line.removed {
      background-color: var(--cc-diff-red-bg);
      color: var(--cc-diff-red);
    }

    .cc-diff-line.added {
      background-color: var(--cc-diff-green-bg);
      color: var(--cc-diff-green);
    }

    .cc-diff-line.context {
      color: var(--cc-text);
    }

    /* ========================================
       10. cc-permission — Permission dialog
       ======================================== */
    .cc-permission {
      margin: 8px 0;
    }

    .cc-permission-question {
      color: var(--cc-text-bold);
      font-weight: 600;
      padding: 2px 0;
      margin-bottom: 4px;
    }

    .cc-permission-option {
      color: var(--cc-muted);
      padding: 1px 0 1px 8px;
      font-size: 13px;
    }

    .cc-permission-option.selected {
      color: var(--cc-text-bold);
    }

    .cc-permission-option .cc-chevron {
      color: var(--cc-accent);
      margin-right: 4px;
    }

    .cc-permission-hint {
      color: var(--cc-muted);
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.7;
    }

    /* ========================================
       11. cc-prompt — Input prompt line
       ======================================== */
    .cc-prompt {
      padding: 4px 0;
      color: var(--cc-text-bold);
    }

    .cc-prompt .cc-chevron {
      color: var(--cc-accent);
      margin-right: 6px;
    }

    .cc-prompt .cc-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background-color: var(--cc-text-bold);
      vertical-align: text-bottom;
      /* animation: cc-blink 1s step-end infinite; — disabled for screenshots */
    }

    @keyframes cc-blink {
      50% { opacity: 0; }
    }

    /* ========================================
       12. cc-separator — Horizontal divider
       ======================================== */
    hr.cc-separator {
      border: none;
      border-top: 1px solid var(--cc-separator);
      margin: 8px 0;
    }

    /* ========================================
       13. cc-status — Status bar text
       ======================================== */
    .cc-status {
      color: var(--cc-muted);
      font-size: 12px;
      opacity: 0.7;
      padding: 2px 0;
    }

    /* ========================================
       14. cc-list — Numbered list items
       ======================================== */
    .cc-list {
      padding: 2px 0;
    }

    .cc-list-item {
      color: var(--cc-text);
      padding: 1px 0 1px 4px;
      line-height: 1.5;
    }

    .cc-list-item .cc-list-num {
      color: var(--cc-muted);
      margin-right: 4px;
    }

    .cc-list-item .cc-list-label {
      color: var(--cc-text-bold);
      font-weight: 600;
    }

    .cc-list-item .cc-list-desc {
      color: var(--cc-muted);
    }

    /* ========================================
       15. cc-logo — Claude Code mascot (base64 image)
       ======================================== */
    .cc-logo {
      display: block;
      image-rendering: pixelated;
    }

    .cc-logo-sm {
      width: 45px;
      height: 60px;
    }

    .cc-logo-lg {
      width: 68px;
      height: 90px;
    }

    /* Header with logo layout */
    .cc-header-with-logo {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .cc-header-with-logo .cc-logo {
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* ========================================
       Utility: spacing
       ======================================== */
    .cc-gap {
      height: 8px;
    }

    .cc-gap-lg {
      height: 16px;
    }
  </style>
</head>
<body>
  <div class="cc-container">
{{CONTENT}}
  </div>
</body>
</html>
